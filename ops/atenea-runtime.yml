version: 1
project: Atenea
runtimeProfile: deployed-prod-plus-tests
runtimeType: spring-boot
hostBaseUrl: http://127.0.0.1:8081
healthPath: /actuator/health
testCommand: ./scripts/test.sh
browserTestCommand: curl -fsS http://127.0.0.1:8081/actuator/health
commandTimeoutSeconds: 900
cleanupAfterVerification: false
artifactPaths:
  - target/surefire-reports
databaseEngine: postgresql
databaseLocalName: atenea_prod
databaseReplaceMode: explicit_only
dataRefreshEnabled: false

services:
  db:
    image: postgres:16
    container_name: atenea-db-dev
    environment:
      POSTGRES_DB: atenea
      POSTGRES_USER: atenea
      POSTGRES_PASSWORD: atenea
    ports:
      - "${ATENEA_DB_PORT:-5434}:5432"
    volumes:
      - atenea_db_data:/var/lib/postgresql/data

  db-test:
    image: postgres:16
    container_name: atenea-db-test
    environment:
      POSTGRES_DB: atenea_test
      POSTGRES_USER: atenea
      POSTGRES_PASSWORD: atenea
    volumes:
      - atenea_db_test_data:/var/lib/postgresql/data

  codex-app-server:
    build:
      context: .
      dockerfile: docker/codex-app-server.Dockerfile
    container_name: atenea-codex-app-server-dev
    working_dir: /workspace/repos/internal/atenea
    environment:
      HOME: /workspace/codex-home/preview
    volumes:
      - /srv/atenea/workspace/repos:/workspace/repos
      - /srv/atenea/workspace/context:/workspace/context:ro
      - /srv/atenea/workspace/codex-home:/workspace/codex-home
    expose:
      - "8092"

  expo-dev:
    image: node:20-bookworm-slim
    container_name: atenea-expo-dev
    working_dir: /workspace/repos/internal/atenea/mobile
    environment:
      EXPO_NO_TELEMETRY: "1"
      EXPO_PACKAGER_PROXY_URL: https://ateneatest.yudri.es
      EXPO_PUBLIC_ATENEA_API_BASE_URL: ${EXPO_PUBLIC_ATENEA_API_BASE_URL:-https://atenea.yudri.es}
    stdin_open: true
    tty: true
    volumes:
      - /srv/atenea/workspace/repos:/workspace/repos
    expose:
      - "8083"
    command:
      - /bin/sh
      - -lc
      - |
        if [ ! -d node_modules ]; then
          npm ci
        fi
        npx expo start --host lan --port 8083 --clear

  atenea-dev:
    build:
      context: .
      dockerfile: docker/atenea-dev.Dockerfile
    container_name: atenea-dev
    working_dir: /workspace/repos/internal/atenea
    depends_on:
      - db
      - codex-app-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/atenea
      SPRING_DATASOURCE_USERNAME: atenea
      SPRING_DATASOURCE_PASSWORD: atenea
      ATENEA_WORKSPACE_ROOT: /workspace/repos
      ATENEA_CODEX_APP_SERVER_URL: ${ATENEA_CODEX_APP_SERVER_URL:-ws://codex-app-server:8092}
      ATENEA_CODEX_APP_SERVER_CWD: /workspace/repos/internal/atenea
      ATENEA_GITHUB_TOKEN: ${ATENEA_GITHUB_TOKEN:-}
      ATENEA_GITHUB_TOKEN_EXPIRES_AT: ${ATENEA_GITHUB_TOKEN_EXPIRES_AT:-}
      ATENEA_AUTH_BOOTSTRAP_ENABLED: ${ATENEA_AUTH_BOOTSTRAP_ENABLED:-true}
      ATENEA_AUTH_BOOTSTRAP_EMAIL: ${ATENEA_AUTH_BOOTSTRAP_EMAIL:-operator@atenea.local}
      ATENEA_AUTH_BOOTSTRAP_PASSWORD: ${ATENEA_AUTH_BOOTSTRAP_PASSWORD:-secret-pass}
      ATENEA_AUTH_BOOTSTRAP_DISPLAY_NAME: ${ATENEA_AUTH_BOOTSTRAP_DISPLAY_NAME:-Mobile Operator}
      ATENEA_CORE_VOICE_ENABLED: ${ATENEA_CORE_VOICE_ENABLED:-false}
      ATENEA_CORE_VOICE_API_KEY: ${ATENEA_CORE_VOICE_API_KEY:-}
      ATENEA_CORE_LLM_ENABLED: ${ATENEA_CORE_LLM_ENABLED:-true}
      ATENEA_CORE_LLM_PROMPT_VERSION: ${ATENEA_CORE_LLM_PROMPT_VERSION:-core-intent-v6}
    volumes:
      - /srv/atenea/workspace/repos:/workspace/repos
      - /srv/atenea/workspace/context:/workspace/context:ro
      - atenea_m2_cache:/root/.m2
    ports:
      - "${ATENEA_APP_PORT:-8081}:8081"
    command: ["/bin/sh", "-lc", "sleep infinity"]

volumes:
  atenea_db_data:
  atenea_db_test_data:
  atenea_m2_cache:

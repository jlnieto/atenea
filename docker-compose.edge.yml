services:
  caddy:
    image: caddy:2.8
    container_name: atenea-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8083:8083"
    env_file:
      - /srv/atenea/platform/secrets/android-apk-download.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./src/main/resources/static/ops:/srv/atenea/ops-public:ro
      - /srv/atenea/apk-public:/srv/atenea/apk-public:ro
      - /srv/atenea/apk-public-secret:/srv/atenea/apk-public-secret:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
